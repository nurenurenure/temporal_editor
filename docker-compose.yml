networks:
  local-temporal-network:
    name: local-temporal-network  
    driver: bridge

volumes:
  postgres_data: 

services:

  postgresql:
    image: postgres:15-alpine
    container_name: temporal-postgres
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    ports:
      - "5432:5432"
    networks:
      - local-temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.1
    container_name: temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - DBNAME=temporal
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    ports:
      - "7233:7233"
    networks:
      - local-temporal-network

  temporal-ui:
    image: temporalio/ui:2.36.0
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8233:8080"
    networks:
      - local-temporal-network

  backend:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    environment:
      - HOST_WORKFLOWS_DIR=${PWD}/workflows
    volumes:
      - ./workflows:/app/workflows
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - local-temporal-network
  frontend:
    build:
      context: ./my-workflow-editor
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - local-temporal-network 