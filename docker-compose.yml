networks:
  local-temporal-network:
    name: local-temporal-network  
    driver: bridge

volumes:
  postgres_data: # Именованный том для сохранения данных БД

services:

  postgresql:
    image: postgres:15-alpine
    container_name: temporal-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    networks:
      - local-temporal-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.27.1
    container_name: temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - DBNAME=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
    ports:
      - "${TEMPORAL_PORT}:7233"
    networks:
      - local-temporal-network

  temporal-ui:
    image: temporalio/ui:2.36.0
    container_name: temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "${TEMPORAL_UI_PORT}:8080"
    networks:
      - local-temporal-network

  backend:
    build:
      context: .
      dockerfile: cmd/api/Dockerfile
    container_name: backend
    environment:
      # Docker Compose заменит ${PWD} на полный путь хоста еще до старта бэкенда
      - HOST_WORKFLOWS_DIR=${PWD}/workflows 
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./workflows:/app/workflows
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_started
    networks:
      - local-temporal-network

  frontend:
    build:
      context: ./my-workflow-editor
    container_name: frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    networks:
      - local-temporal-network